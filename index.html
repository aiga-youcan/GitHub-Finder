<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Finder</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/jpg" href="icon.jpg" />
  </head>

  <body>
    <!-- ================= NAV ================= -->
    <nav class="nav">
      <a href="index.html" style="text-decoration: none;">
        <h1 style="color: aliceblue;">GitHub Finder</h1>
      </a>

      <button class="btn">FAVORIS</button>
    </nav>

    <!-- ============== WELCOME ============== -->
    <section id="welcome-section" style="width: 100%;">
      <h2 style="text-align: center;">Trouvez des profils GitHub rapidement et facilement.</h2>
    </section>

    <!-- ============== LOADING ============== -->
    <section id="loading-section" style="width: 100%;">
      <div class="loader"></div>
      <p style="text-align: center;">Chargement...</p>
    </section>

    <!-- ============== ERROR ============== -->
    <section id="error-section" style="width: 100%;">
      <p class="error-message" style="color: red; text-align: center; font-size: larger;">Utilisateur non trouvé</p>
    </section>

    <!-- ============== SEARCH ============== -->
    <section id="results-section" style="width: 100%;">
      <form id="search-form">
        <input
          type="text"
          id="search-input"
          placeholder="Rechercher un utilisateur GitHub..."
          required
        />

        <button type="submit" id="search-btn">Search</button>
      </form>

      <div id="user-profile-container"></div>
    </section>

    <!-- ============== FAVORITES ============== -->
    <section id="bookmarks-section" style="width: 100%;">
      <h2 style="text-align: center;">Favoris</h2>

      <div id="bookmarks-container"></div>
    </section>

    <!-- ============== FOOTER ============== -->
    <footer class="footer">
      <p>© 2026 GitHub Finder. Tous droits réservés.</p>
    </footer>
  </body>
</html>
